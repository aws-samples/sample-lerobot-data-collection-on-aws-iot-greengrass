---
RecipeFormatVersion: "2020-01-25"
ComponentName: com.groot.kvs-webrtc-p2p
ComponentVersion: "1.0.0"
ComponentType: "aws.greengrass.generic"
ComponentDescription: "Color v4l2 (/dev/video4) tee -> KVS WebRTC P2P master (thor-001-p2p, sub-second live) + kvssink recording (KVS stream thor-001-webrtc, HLS replay). Low-latency replacement for the storage-ingest monitor. no-downtime IoT creds."
ComponentPublisher: Custom
ComponentConfiguration:
  DefaultConfiguration:
    channelName: "thor-001-p2p"
    region: "ap-northeast-2"
    videoDevice: "/dev/video4"
    videoWidth: "640"
    videoHeight: "480"
    videoFps: "30"
    rtspUrl: ""
    iotCredEndpoint: ""
    iotRoleAlias: ""
    credentialRefreshSec: "86400"
    thingName: "thor-001"
    viewerRoleArn: "arn:aws:iam::<AWS_ACCOUNT_ID>:role/KvsViewerRole"
    accessControl:
      aws.greengrass.ipc.mqttproxy:
        "com.groot.kvs-webrtc-p2p:pub:1":
          policyDescription: "Publish WebRTC ingestion status + web viewer credentials"
          operations:
            - "aws.greengrass#PublishToIoTCore"
          resources:
            - "groot/+/kvs-ingest/status"
            - "lerobot/+/webrtc/p2p-viewer"
Manifests:
  - Platform:
      os: linux
      architecture: aarch64
    Lifecycle:
      install:
        RequiresPrivilege: true
        Script: |
          set -e
          export DEBIAN_FRONTEND=noninteractive
          apt-get -o DPkg::Lock::Timeout=300 update -qq
          apt-get -o DPkg::Lock::Timeout=300 install -y -qq \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly \
            gstreamer1.0-tools v4l-utils

          P2P_BIN=/opt/kvs-webrtc-p2p/build/samples/kvsWebrtcClientMasterGstSample
          apt-get -o DPkg::Lock::Timeout=300 install -y -qq \
            cmake build-essential pkg-config \
            libssl-dev libcurl4-openssl-dev liblog4cplus-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-bad1.0-dev \
            libsrtp2-dev libusb-1.0-0-dev git

          mkdir -p /opt/kvs-webrtc-p2p/build && cd /opt/kvs-webrtc-p2p
          if [ ! -d "amazon-kinesis-video-streams-webrtc-sdk-c" ]; then
            git clone --depth 1 https://github.com/awslabs/amazon-kinesis-video-streams-webrtc-sdk-c.git
          fi
          GST_MEDIA=amazon-kinesis-video-streams-webrtc-sdk-c/samples/common/GstMedia.c
          git -C amazon-kinesis-video-streams-webrtc-sdk-c checkout -- samples/common/GstMedia.c 2>/dev/null || true
          echo "[install] === /dev/video* formats ==="
          for d in /dev/video*; do
            echo "[install] $d:"
            v4l2-ctl -d "$d" --list-formats 2>/dev/null | grep -iE "\[[0-9]|Pixel Format" | sed 's/^/[install]   /'
          done
          VCOLOR="{configuration:/videoDevice}"
          if [ -z "$VCOLOR" ]; then
            for d in /dev/video*; do
              if v4l2-ctl -d "$d" --list-formats 2>/dev/null | grep -qiE "YUYV|MJPG|MJPEG|UYVY|NV12|RGB"; then VCOLOR="$d"; break; fi
            done
            VCOLOR="${VCOLOR:-/dev/video8}"
          fi
          echo "[install] selected COLOR device: $VCOLOR"
          sed -i "s|autovideosrc ! queue ! videoconvert ! video/x-raw,width=1280,height=720,framerate=25/1 !|v4l2src device=$VCOLOR ! queue ! videoconvert ! video/x-raw,format=I420 !|g" "$GST_MEDIA"
          echo "[install] GstMedia.c video source -> v4l2src $VCOLOR"
          sed -i 's|videoconvert ! video/x-raw,format=I420 !|videoconvert ! clockoverlay halignment=right valignment=bottom shaded-background=true ! video/x-raw,format=I420 !|g' "$GST_MEDIA"
          echo "[install] GstMedia.c clockoverlay (device time, bottom-right) added"
          sed -i "s|x264enc [^!]*!|x264enc bframes=0 speed-preset=ultrafast tune=zerolatency bitrate=2000 key-int-max=30 !|g" "$GST_MEDIA"
          echo "[install] GstMedia.c x264enc -> low-latency (tune=zerolatency, bframes=0, key-int-max=30)"
          EC=/greengrass/v2/config/effectiveConfig.yaml
          cfgval() { grep -oE "$1[\"' ]*:[\"' ]*[^\"']+" "$EC" 2>/dev/null | head -1 | sed -E "s/.*:[\"' ]*//; s|^file://||; s/[\"' ]*$//"; }
          I_EP="$(cfgval iotCredEndpoint)"; I_RA="$(cfgval iotRoleAlias)"
          I_CERT="$(cfgval certificateFilePath)"; I_KEY="$(cfgval privateKeyPath)"; I_CA="$(cfgval rootCaPath)"
          I_THING="$(cfgval thingName)"; [ -z "$I_THING" ] && I_THING="thor-001"
          REC_STREAM="thor-001-webrtc"; REC_REGION="{configuration:/region}"
          KVSSINK="kvssink stream-name=$REC_STREAM aws-region=$REC_REGION storage-size=128 iot-certificate=iot-certificate,endpoint=$I_EP,cert-path=$I_CERT,key-path=$I_KEY,ca-path=$I_CA,role-aliases=$I_RA,iot-thing-name=$I_THING"
          echo "[install] kvssink recording -> $REC_STREAM (iot-certificate endpoint=$I_EP alias=$I_RA)"
          export KVSSINK
          echo '' | base64 -d | python3 - "$GST_MEDIA"
          cd build
          cmake ../amazon-kinesis-video-streams-webrtc-sdk-c \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SAMPLE=ON \
            -DIOT_CORE_ENABLE_CREDENTIALS=ON \
            -DOPEN_SRC_INSTALL_PREFIX=/opt/kvs-webrtc-p2p/open-source
          make -j$(nproc)
          test -f "$P2P_BIN" || { echo "ERROR: P2P master sample not built"; exit 1; }
          echo "KVS WebRTC P2P master sample (IoT-creds, v4l2/RTSP, H.264) build complete"
          if [ ! -f /opt/kvs-producer/build/libgstkvssink.so ]; then
            mkdir -p /opt/kvs-producer && cd /opt/kvs-producer
            if [ ! -d amazon-kinesis-video-streams-producer-sdk-cpp ]; then
              git clone --depth 1 https://github.com/awslabs/amazon-kinesis-video-streams-producer-sdk-cpp.git
            fi
            mkdir -p build && cd build
            cmake ../amazon-kinesis-video-streams-producer-sdk-cpp -DCMAKE_BUILD_TYPE=Release -DBUILD_GSTREAMER_PLUGIN=ON
            make -j$(nproc)
            test -f /opt/kvs-producer/build/libgstkvssink.so || { echo "ERROR: kvssink not built"; exit 1; }
            echo "[install] KVS producer plugin (kvssink) build complete"
          else
            echo "[install] kvssink already built"
          fi
        Timeout: 5400
      run:
        RequiresPrivilege: true
        Script: |
          CHANNEL="{configuration:/channelName}"
          REGION="{configuration:/region}"
          WIDTH="{configuration:/videoWidth}"
          HEIGHT="{configuration:/videoHeight}"
          FPS="{configuration:/videoFps}"
          VIDEO_DEV="{configuration:/videoDevice}"
          REFRESH_SEC="{configuration:/credentialRefreshSec}"
          THING="{configuration:/thingName}"
          RTSP_URL="{configuration:/rtspUrl}"
          IOT_CRED_EP_CFG="{configuration:/iotCredEndpoint}"
          IOT_ROLE_ALIAS_CFG="{configuration:/iotRoleAlias}"

          export AWS_DEFAULT_REGION="$REGION"
          export LD_LIBRARY_PATH=/opt/kvs-webrtc-p2p/open-source/lib:/opt/kvs-producer/build:${LD_LIBRARY_PATH:-}
          TOPIC_STATUS="groot/$THING/kvs-ingest/status"

          EC=/greengrass/v2/config/effectiveConfig.yaml
          cfgval() { grep -oE "$1[\"' ]*:[\"' ]*[^\"']+" "$EC" 2>/dev/null | head -1 | sed -E "s/.*:[\"' ]*//; s|^file://||; s/[\"' ]*$//"; }
          IOT_CRED_EP="${IOT_CRED_EP_CFG:-$(cfgval iotCredEndpoint)}"
          IOT_ROLE_ALIAS="${IOT_ROLE_ALIAS_CFG:-$(cfgval iotRoleAlias)}"
          IOT_CERT="$(cfgval certificateFilePath)"
          IOT_KEY="$(cfgval privateKeyPath)"
          IOT_CACERT="$(cfgval rootCaPath)"
          [ -z "$THING" ] && THING="$(cfgval thingName)"
          echo "[IoT] endpoint=$IOT_CRED_EP roleAlias=$IOT_ROLE_ALIAS thing=$THING"
          echo "[IoT] cert=$IOT_CERT key=$IOT_KEY ca=$IOT_CACERT"
          if [ -n "$IOT_CRED_EP" ] && [ -n "$IOT_ROLE_ALIAS" ] && [ -f "$IOT_CERT" ] && [ -f "$IOT_KEY" ] && [ -f "$IOT_CACERT" ]; then
            export AWS_IOT_CORE_CREDENTIAL_ENDPOINT="$IOT_CRED_EP"
            export AWS_IOT_CORE_CERT="$IOT_CERT"
            export AWS_IOT_CORE_PRIVATE_KEY="$IOT_KEY"
            export AWS_IOT_CORE_ROLE_ALIAS="$IOT_ROLE_ALIAS"
            export AWS_IOT_CORE_THING_NAME="$THING"
            export AWS_KVS_CACERT_PATH="$IOT_CACERT"
            echo "[IoT] auto-refresh credential provider CONFIGURED (no-downtime)"
          else
            echo "[IoT] WARNING: could not resolve IoT credential config; sample (IOT_CORE_ENABLE_CREDENTIALS build) will fail -> deployment ROLLBACK expected"
          fi

          if [ -z "$VIDEO_DEV" ]; then
            for dev in /dev/video*; do
              if v4l2-ctl -d "$dev" --list-formats 2>/dev/null | grep -q "YUYV"; then
                VIDEO_DEV="$dev"; echo "[Auto] color(YUYV) device: $dev"; break
              fi
            done
            VIDEO_DEV="${VIDEO_DEV:-/dev/video0}"
          fi
          echo "[Info] color device: $VIDEO_DEV"
          v4l2-ctl -d "$VIDEO_DEV" --list-formats-ext 2>/dev/null | head -20 || true

          get_credentials() {
            if [ -n "${AWS_CONTAINER_CREDENTIALS_FULL_URI:-}" ]; then
              CREDS=$(python3 -c "
          import urllib.request, json, os
          uri = os.environ['AWS_CONTAINER_CREDENTIALS_FULL_URI']
          token = os.environ.get('AWS_CONTAINER_AUTHORIZATION_TOKEN', '')
          req = urllib.request.Request(uri, headers={'Authorization': token})
          c = json.loads(urllib.request.urlopen(req).read())
          print(f\"{c['AccessKeyId']} {c['SecretAccessKey']} {c['Token']}\")
          ")
              export AWS_ACCESS_KEY_ID=$(echo "$CREDS" | cut -d' ' -f1)
              export AWS_SECRET_ACCESS_KEY=$(echo "$CREDS" | cut -d' ' -f2)
              export AWS_SESSION_TOKEN=$(echo "$CREDS" | cut -d' ' -f3-)
            fi
          }
          publish_status() {
            aws iot-data publish --topic "$TOPIC_STATUS" \
              --payload "{\"state\":\"$1\",\"channel\":\"$CHANNEL\",\"stream\":\"thor-001-webrtc\",\"device\":\"$VIDEO_DEV\",\"ingestion\":true}" \
              --region "$REGION" 2>/dev/null || true
          }

          get_credentials
          aws kinesisvideo create-signaling-channel --channel-name "$CHANNEL" --region "$REGION" 2>/dev/null || true

          echo "=== KVS WebRTC Ingestion v1.0.0 ==="
          echo "Channel: $CHANNEL (P2P, non-storage) | Device: $VIDEO_DEV | ${WIDTH}x${HEIGHT}@${FPS} | COLOR(YUYV)"

          export AWS_KVS_VIDEO_DEVICE="$VIDEO_DEV"
          export AWS_KVS_VIDEO_WIDTH="$WIDTH"
          export AWS_KVS_VIDEO_HEIGHT="$HEIGHT"
          export AWS_KVS_VIDEO_FPS="$FPS"
          export GST_PLUGIN_PATH=/opt/kvs-webrtc-p2p/build:/opt/kvs-producer/build
          export AWS_KVS_LOG_LEVEL=2

          VIEWER_ROLE_ARN="{configuration:/viewerRoleArn}"
          export CHANNEL REGION THING VIEWER_ROLE_ARN
          echo '' | base64 -d | python3 -u - &

          # Free the capture device from any lingering SDK process left by a
          # previous (re)start. Match by exact process comm ("kvsWebrtcStorag",
          # Linux 15-char comm) NOT -f: a -f full-cmdline match also matches this
          # run script itself (its text contains the binary name) and SIGKILLs it.
          pkill -9 -x kvsWebrtcClient 2>/dev/null || true
          sleep 2

          while true; do
            get_credentials
            publish_status "starting"
            echo "[$(date)] Starting WebRTC P2P master (direct) on $CHANNEL ..."
            if [ -n "$RTSP_URL" ]; then
              echo "[$(date)] source=RTSP $RTSP_URL"
              stdbuf -oL -eL /opt/kvs-webrtc-p2p/build/samples/kvsWebrtcClientMasterGstSample \
                "$CHANNEL" rtspsrc "$RTSP_URL" 2>&1 &
            else
              echo "[$(date)] source=devicesrc $VIDEO_DEV"
              stdbuf -oL -eL /opt/kvs-webrtc-p2p/build/samples/kvsWebrtcClientMasterGstSample \
                "$CHANNEL" devicesrc 2>&1 &
            fi
            SDK_PID=$!
            publish_status "ingesting"

            WAITED=0
            while [ $WAITED -lt $REFRESH_SEC ]; do
              if ! kill -0 $SDK_PID 2>/dev/null; then
                echo "[$(date)] SDK exited, restart in 5s"; publish_status "restarting"; sleep 5; break
              fi
              sleep 10; WAITED=$((WAITED + 10))
            done
            if kill -0 $SDK_PID 2>/dev/null; then
              echo "[$(date)] Credential refresh - restarting SDK"
              kill $SDK_PID 2>/dev/null; wait $SDK_PID 2>/dev/null || true; sleep 2
            fi
          done
      shutdown:
        Script: |
          pkill -9 -x kvsWebrtcClient 2>/dev/null || true
        Timeout: 5

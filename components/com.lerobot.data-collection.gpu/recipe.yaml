---
RecipeFormatVersion: "2020-01-25"
ComponentName: "com.lerobot.data-collection.gpu"
ComponentVersion: "1.0.0"
ComponentType: "aws.greengrass.generic"
ComponentDescription: "LeRobot data collection — GPU(NVENC) accelerated video encoding\
  \ variant. 기존 com.lerobot.data-collection 의 복사본이며 인코딩만 GPU 로 가속(별도 이미지 태그). 원본 컴\
  포넌트/이미지/collect.py 는 건드리지 않음."
ComponentPublisher: "Custom"
ComponentConfiguration:
  DefaultConfiguration:
    leaderPort: "/dev/ttyACM0"
    followerPort: "/dev/ttyACM1"
    robotType: "so101"
    frontCameraIndex: "/dev/cam_front"
    wristCameraIndex: "/dev/cam_wrist"
    cameraWidth: "640"
    cameraHeight: "480"
    cameraFps: "30"
    langInstruction: "pick orange"
    datasetName: "pick_orange_demo"
    numEpisodes: "50"
    episodeLength: "300"
    datasetDir: "/home/arobot/Desktop/physical-ai/so-101/outputs"
    s3Bucket: ""
    s3Prefix: "datasets/"
    thingName: "lerobot-device"
    region: "ap-northeast-2"
    kvsStreamName: "thor-001-camera"
    dataImage: "lerobot-data-collection-gpu:1.0.0"
    gpuEncode: "1"
    videoCodec: "h264_nvenc"
    lerobotCommit: "c75455a6de5c818fa1bb69fb2d92423e86c70475"
    torchVersion: "2.10.0"
    torchvisionVersion: "0.25.0"
    torchcodecVersion: "0.10.0"
    tritonVersion: "3.5.0"
    jetsonTorchIndex: "https://pypi.jetson-ai-lab.io/sbsa/cu130/+simple"
    accessControl:
      aws.greengrass.ipc.mqttproxy:
        com.lerobot.data-collection.gpu:pub:1:
          policyDescription: "Publish status, video and file listing"
          operations:
          - "aws.greengrass#PublishToIoTCore"
          resources:
          - "lerobot/+/collect/status"
          - "lerobot/+/collect/video"
          - "lerobot/+/collect/files"
          - "lerobot/+/collect/kvs"
          - "$aws/things/+/shadow/name/episodes/update"
        com.lerobot.data-collection.gpu:sub:1:
          policyDescription: "Subscribe to commands"
          operations:
          - "aws.greengrass#SubscribeToIoTCore"
          resources:
          - "lerobot/+/collect/command"
Manifests:
- Platform:
    os: "linux"
    architecture: "aarch64"
  Lifecycle:
    install:
      RequiresPrivilege: true
      Script: "set -e\nmkdir -p /home/arobot/Desktop/physical-ai/so-101/outputs\n\
        pip3 install --break-system-packages -q awsiotsdk boto3 pyarrow 2>/dev/null\
        \ || true\n\n# ---------------------------------------------------------------\n\
        # GPU 변형: 원본 minimal 이미지와 동일한 스택을 빌드하되,\n#  (1) ffmpeg NVENC shim 을 넣어 lerobot\
        \ 의 libsvtav1(CPU AV1) 인코딩을\n#      h264_nvenc(GPU) 로 치환 — 실패 시 원본 인자로 CPU\
        \ 폴백(안전).\n#  (2) ENV GPU_ENCODE / VIDEO_CODEC baked → 컨테이너 상속.\n# 별도 태그($dataImage)로\
        \ 빌드하므로 원본 이미지와 충돌 없음. Idempotent.\n# ---------------------------------------------------------------\n\
        DATA_IMAGE=\"{configuration:/dataImage}\"\nLEROBOT_COMMIT=\"{configuration:/lerobotCommit}\"\
        \nTORCH_VERSION=\"{configuration:/torchVersion}\"\nTORCHVISION_VERSION=\"\
        {configuration:/torchvisionVersion}\"\nTORCHCODEC_VERSION=\"{configuration:/torchcodecVersion}\"\
        \nTRITON_VERSION=\"{configuration:/tritonVersion}\"\nJETSON_INDEX=\"{configuration:/jetsonTorchIndex}\"\
        \n\nif docker images --format '{{.Repository}}:{{.Tag}}' | grep -q \"^${DATA_IMAGE}$\"\
        ; then\n  echo \"[install] $DATA_IMAGE already exists — skipping build\"\n\
        \  exit 0\nfi\n\nARCH=\"$(uname -m)\"\nif [ \"$ARCH\" != \"aarch64\" ]; then\n\
        \  echo \"[install] WARNING: standalone build targets aarch64 (Jetson Thor);\
        \ detected $ARCH\"\nfi\n\nBUILD_DIR=\"/tmp/lerobot-data-collection-gpu-build\"\
        \nrm -rf \"$BUILD_DIR\" && mkdir -p \"$BUILD_DIR\"\n\n# NVENC ffmpeg shim:\
        \ lerobot 이 호출하는 `ffmpeg`(PATH) 를 가로채,\n# -vcodec libsvtav1 → -vcodec $VIDEO_CODEC(h264_nvenc),\
        \ -crf → -cq 로 치환,\n# svtav1 전용 파라미터 제거. NVENC 실패 시 원본 인자로 실제 ffmpeg 재실행(CPU\
        \ 폴백).\ncat > \"$BUILD_DIR/ffmpeg-nvenc-shim\" << 'SHIMEOF'\n#!/bin/bash\n\
        REAL=/usr/bin/ffmpeg\nif [ \"${GPU_ENCODE:-1}\" = \"1\" ] && printf '%s\\\
        n' \"$@\" | grep -q 'libsvtav1'; then\n  args=(); skip=0\n  for a in \"$@\"\
        ; do\n    if [ \"$skip\" = \"1\" ]; then skip=0; continue; fi\n    case \"\
        $a\" in\n      libsvtav1) args+=(\"${VIDEO_CODEC:-h264_nvenc}\");;\n     \
        \ -svtav1-params) skip=1;;\n      -crf) args+=(\"-cq\");;\n      *) args+=(\"\
        $a\");;\n    esac\n  done\n  if \"$REAL\" \"${args[@]}\"; then exit 0; fi\n\
        \  echo \"[ffmpeg-nvenc-shim] NVENC encode failed — falling back to CPU (original\
        \ args)\" >&2\nfi\nexec \"$REAL\" \"$@\"\nSHIMEOF\n\n# Self-contained Dockerfile\
        \ (원본 minimal + NVENC shim/ENV).\ncat > \"$BUILD_DIR/Dockerfile\" << 'DKEOF'\n\
        FROM nvidia/cuda:13.0.2-cudnn-devel-ubuntu24.04\nENV NVIDIA_DRIVER_CAPABILITIES=graphics,utility,compute,video\n\
        ENV DEBIAN_FRONTEND=noninteractive\nENV UV_PROJECT_ENVIRONMENT=/opt/gr00t-venv\n\
        ARG TORCH_VERSION\nARG TORCHVISION_VERSION\nARG TORCHCODEC_VERSION\nARG TRITON_VERSION\n\
        ARG JETSON_INDEX\nARG LEROBOT_COMMIT\nRUN apt-get update && apt-get install\
        \ -y --no-install-recommends \\\n        python3 python3-venv python3-dev\
        \ \\\n        git git-lfs curl ca-certificates \\\n        build-essential\
        \ pkg-config pybind11-dev \\\n        ffmpeg libavdevice-dev libavfilter-dev\
        \ libavformat-dev \\\n        libavcodec-dev libavutil-dev libswresample-dev\
        \ libswscale-dev \\\n        libgl1 libglib2.0-0 \\\n    && rm -rf /var/lib/apt/lists/*\
        \ && git lfs install\nRUN apt-get update && apt-get install -y --no-install-recommends\
        \ \\\n        libnvpl-lapack0 libnvpl-blas0 && \\\n    rm -rf /var/lib/apt/lists/*\n\
        RUN curl -LsSf https://astral.sh/uv/install.sh | sh\nENV PATH=\"/root/.local/bin:/opt/gr00t-venv/bin:/usr/local/cuda/bin:$PATH\"\
        \nRUN uv venv /opt/gr00t-venv --python 3.12\nENV VIRTUAL_ENV=/opt/gr00t-venv\n\
        ENV CUDA_HOME=/usr/local/cuda-13.0\nRUN uv pip install --python /opt/gr00t-venv/bin/python\
        \ --index-url \"${JETSON_INDEX}\" \\\n        \"torch==${TORCH_VERSION}\"\
        \ \"torchvision==${TORCHVISION_VERSION}\" \"triton==${TRITON_VERSION}\"\n\
        RUN uv pip install --python /opt/gr00t-venv/bin/python nvidia-cudss-cu13\n\
        ENV LD_LIBRARY_PATH=\"/opt/gr00t-venv/lib/python3.12/site-packages/torch/lib:/opt/gr00t-venv/lib/python3.12/site-packages/nvidia/cu13/lib:/opt/gr00t-venv/lib/python3.12/site-packages/nvidia/cudss/lib:/opt/gr00t-venv/lib/python3.12/site-packages/nvidia/cudnn/lib:/usr/local/cuda-13.0/lib64\"\
        \nRUN apt-get update && apt-get install -y --no-install-recommends cmake &&\
        \ \\\n    rm -rf /var/lib/apt/lists/*\nRUN uv pip install --python /opt/gr00t-venv/bin/python\
        \ setuptools && \\\n    NV=\"$(find /opt/gr00t-venv/lib/python3.12/site-packages/nvidia\
        \ -name lib -type d 2>/dev/null | tr '\\n' ':')\" && \\\n    export LD_LIBRARY_PATH=\"\
        /opt/gr00t-venv/lib/python3.12/site-packages/torch/lib:${NV}${LD_LIBRARY_PATH}\"\
        \ && \\\n    export CPATH=\"${CUDA_HOME}/include:${CPATH:-}\" && \\\n    git\
        \ clone --depth 1 --branch \"v${TORCHCODEC_VERSION}\" https://github.com/pytorch/torchcodec.git\
        \ /tmp/tc && \\\n    cd /tmp/tc && I_CONFIRM_THIS_IS_NOT_A_LICENSE_VIOLATION=1\
        \ \\\n      uv pip install --python /opt/gr00t-venv/bin/python . --no-build-isolation\
        \ && \\\n    cd / && rm -rf /tmp/tc\nRUN uv pip install --python /opt/gr00t-venv/bin/python\
        \ \\\n        draccus==0.10.0 deepdiff pyyaml einops numpy==1.26.4 boto3 rerun-sdk\
        \ \\\n        datasets diffusers \"huggingface-hub[hf-transfer,cli]\" accelerate\
        \ \\\n        pynput wandb gymnasium \"imageio[ffmpeg]\" termcolor safetensors\
        \ av jsonlines && \\\n    uv pip install --python /opt/gr00t-venv/bin/python\
        \ --no-deps \\\n        feetech-servo-sdk pyserial opencv-python-headless\
        \ awsiotsdk && \\\n    uv pip install --python /opt/gr00t-venv/bin/python\
        \ --no-deps \\\n        \"lerobot @ git+https://github.com/huggingface/lerobot.git@${LEROBOT_COMMIT}\"\
        \nRUN test -x /opt/gr00t-venv/bin/lerobot-record || (echo \"lerobot-record\
        \ missing\" && exit 1)\n# --- External control channel patch (FIFO) --- (원\
        본과 동일)\nRUN CU=$(find /opt/gr00t-venv -path '*/lerobot/utils/control_utils.py'\
        \ | head -1) && \\\n    test -n \"$CU\" && \\\n    echo ''\
        \ | base64 -d >> \"$CU\" && \\\n    echo \"[install] control_utils.py FIFO\
        \ patch applied to $CU\"\n# --- GPU: NVENC ffmpeg shim + ENV (원본 대비 추가된 부분\
        ) ---\nCOPY ffmpeg-nvenc-shim /usr/local/bin/ffmpeg\nRUN chmod +x /usr/local/bin/ffmpeg\
        \ && \\\n    echo \"[install] NVENC ffmpeg shim installed at /usr/local/bin/ffmpeg\
        \ (before /usr/bin)\"\nENV GPU_ENCODE=1\nENV VIDEO_CODEC=h264_nvenc\nWORKDIR\
        \ /workspace\nENTRYPOINT [\"/bin/bash\"]\nDKEOF\n\necho \"[install] building\
        \ GPU variant $DATA_IMAGE (this can take a while) ...\"\ndocker build -t \"\
        $DATA_IMAGE\" \\\n  --build-arg TORCH_VERSION=\"$TORCH_VERSION\" \\\n  --build-arg\
        \ TORCHVISION_VERSION=\"$TORCHVISION_VERSION\" \\\n  --build-arg TORCHCODEC_VERSION=\"\
        $TORCHCODEC_VERSION\" \\\n  --build-arg TRITON_VERSION=\"$TRITON_VERSION\"\
        \ \\\n  --build-arg JETSON_INDEX=\"$JETSON_INDEX\" \\\n  --build-arg LEROBOT_COMMIT=\"\
        $LEROBOT_COMMIT\" \\\n  \"$BUILD_DIR\"\nrm -rf \"$BUILD_DIR\"\necho \"[install]\
        \ build complete: $DATA_IMAGE\"\n"
      Timeout: 7200
    run:
      RequiresPrivilege: true
      Script: "export THING_NAME=\"{configuration:/thingName}\"\nexport LEADER_PORT=\"\
        {configuration:/leaderPort}\"\nexport FOLLOWER_PORT=\"{configuration:/followerPort}\"\
        \nexport FRONT_CAMERA=\"{configuration:/frontCameraIndex}\"\nexport WRIST_CAMERA=\"\
        {configuration:/wristCameraIndex}\"\nexport CAMERA_WIDTH=\"{configuration:/cameraWidth}\"\
        \nexport CAMERA_HEIGHT=\"{configuration:/cameraHeight}\"\nexport CAMERA_FPS=\"\
        {configuration:/cameraFps}\"\nexport LANG_INSTRUCTION=\"{configuration:/langInstruction}\"\
        \nexport DATASET_NAME=\"{configuration:/datasetName}\"\nexport NUM_EPISODES=\"\
        {configuration:/numEpisodes}\"\nexport EPISODE_LENGTH=\"{configuration:/episodeLength}\"\
        \nexport DATASET_DIR=\"{configuration:/datasetDir}\"\nexport S3_BUCKET=\"\
        {configuration:/s3Bucket}\"\nexport S3_PREFIX=\"{configuration:/s3Prefix}\"\
        \nexport DATA_IMAGE=\"{configuration:/dataImage}\"\nexport KVS_STREAM=\"{configuration:/kvsStreamName}\"\
        \nexport AWS_DEFAULT_REGION=\"{configuration:/region}\"\nexport GPU_ENCODE=\"\
        {configuration:/gpuEncode}\"\nexport VIDEO_CODEC=\"{configuration:/videoCodec}\"\
        \nmkdir -p /opt/groot\n# collect.py 는 원본과 동일한 로직 → 원본 버전 폴더에서 재사용(별도 업로드 불\
        필요).\naws s3 cp \"s3://greengrass-datasets-<AWS_ACCOUNT_ID>/collect/com.lerobot.data-collection/1.0.0/collect.py\"\
        \ /opt/groot/collect.py --region ap-northeast-2\npython3 -u /opt/groot/collect.py\n"
    shutdown:
      RequiresPrivilege: true
      Script: "docker stop lerobot-record 2>/dev/null || true\ndocker rm   lerobot-record\
        \ 2>/dev/null || true\npkill -f \"collect.py\" 2>/dev/null || true\n"
      Timeout: 10
  Artifacts: []
Lifecycle: {}
